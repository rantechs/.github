name: Sync portfolio

# Regenerate the Featured projects block in profile/README.md from the showcase
# repo's data/projects.yml. Runs on a schedule (the metadata lives in another repo,
# so we poll), on demand, and when the generator itself changes.
on:
  schedule:
    - cron: '0 */6 * * *' # every 6 hours
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'scripts/gen-readme.mjs'
      - 'package.json'

permissions:
  contents: write

concurrency:
  group: sync-portfolio
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - run: npm ci || npm install
      - run: npm run gen:readme
      - name: Commit if changed
        run: |
          if [ -n "$(git status --porcelain profile/README.md)" ]; then
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add profile/README.md
            git commit -m "chore: sync portfolio README from projects.yml [skip ci]"
            git push
          else
            echo "profile/README.md already up to date."
          fi
